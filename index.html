<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AI Control ESP32</title>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest"></script>
</head>

<body>
  <h2>Teachable Machine → Adafruit → ESP32</h2>
  <button onclick="init()">Start Camera</button>
  <div id="label"></div>

<script>
const URL = "https://teachablemachine.withgoogle.com/models/xxxxx/"; // link model

let model, webcam;
let lastSent = "";

async function init() {
    model = await tmImage.load(URL + "model.json", URL + "metadata.json");

    webcam = new tmImage.Webcam(300, 300, true);
    await webcam.setup();
    await webcam.play();
    document.body.appendChild(webcam.canvas);

    window.requestAnimationFrame(loop);
}

async function loop() {
    webcam.update();
    await predict();
    window.requestAnimationFrame(loop);
}

async function predict() {
    const prediction = await model.predict(webcam.canvas);

    let best = prediction.reduce((max, p) => p.probability > max.probability ? p : max);

    document.getElementById("label").innerHTML =
        best.className + " (" + best.probability.toFixed(2) + ")";

    if (best.probability > 0.9 && best.className !== lastSent) {
        sendToAdafruit(best.className);
        lastSent = best.className;
    }
}

function sendToAdafruit(value) {
    fetch("https://io.adafruit.com/api/v2/YOUR_USERNAME/feeds/led/data", {
        method: "POST",
        headers: {
            "X-AIO-Key": "YOUR_AIO_KEY",
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ value: value })
    });

    console.log("Sent:", value);
}
</script>

</body>
</html>
