<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AI ESP32</title>

  <!-- QUAN TRỌNG: phải load đúng -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest"></script>
</head>

<body>

<h2>AI Control ESP32</h2>
<button onclick="init()">Start Camera</button>

<p id="result">Waiting...</p>

<script>
const URL = "https://teachablemachine.withgoogle.com/models/FX7M1MGaT/";

const USERNAME = "PhuNguyenLe";
const AIO_KEY = "PASTE_KEY_MOI"; // đổi key mới
const FEED = "led";

let model, webcam;

async function init() {
    console.log("Start init");

    model = await tmImage.load(URL + "model.json", URL + "metadata.json");

    webcam = new tmImage.Webcam(200, 200, true);
    await webcam.setup();
    await webcam.play();

    document.body.appendChild(webcam.canvas);

    loop();
}

async function loop() {
    webcam.update();

    const prediction = await model.predict(webcam.canvas);

    let best = prediction.reduce((a,b)=>a.probability>b.probability?a:b);

    document.getElementById("result").innerText =
        best.className + " " + best.probability.toFixed(2);

    if(best.probability > 0.9){
        send(best.className);
    }

    requestAnimationFrame(loop);
}

function send(value){
    console.log("Sending:", value);

    fetch(`https://io.adafruit.com/api/v2/${USERNAME}/feeds/${FEED}/data`, {
        method: "POST",
        headers: {
            "X-AIO-Key": AIO_KEY,
            "Content-Type": "application/json"
        },
        body: JSON.stringify({value:value})
    });
}
</script>

</body>
</html>
