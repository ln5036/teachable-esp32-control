<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AI Control ESP32</title>

  <!-- Load thư viện -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest"></script>

  <style>
    body { font-family: Arial; text-align: center; }
    video, canvas { margin-top: 10px; }
  </style>
</head>

<body>

<h2>AI Control ESP32 (Teachable Machine)</h2>
<button onclick="init()">Start Camera</button>

<div id="status">Status: Waiting...</div>

<script>
const URL = "https://teachablemachine.withgoogle.com/models/FX7M1MGaT/";

const USERNAME = "PhuNguyenLe";
const AIO_KEY = "aio_fEvA28yfSlwZjxQyJ9U5PULLdhfq";
const FEED = "led";

let model, webcam;
let lastSent = "";
let lastTime = 0;

async function init() {
    try {
        document.getElementById("status").innerText = "Loading model...";

        model = await tmImage.load(URL + "model.json", URL + "metadata.json");

        webcam = new tmImage.Webcam(300, 300, true);
        await webcam.setup();
        await webcam.play();

        document.body.appendChild(webcam.canvas);

        document.getElementById("status").innerText = "Camera started";

        window.requestAnimationFrame(loop);
    } catch (e) {
        console.error(e);
        alert("Lỗi mở camera hoặc load model!");
    }
}

async function loop() {
    webcam.update();
    await predict();
    window.requestAnimationFrame(loop);
}

async function predict() {
    const prediction = await model.predict(webcam.canvas);

    let best = prediction.reduce((max, p) =>
        p.probability > max.probability ? p : max
    );

    document.getElementById("status").innerText =
        best.className + " (" + best.probability.toFixed(2) + ")";

    let now = Date.now();

    // tránh spam API (2 giây mới gửi lại)
    if (best.probability > 0.9 &&
        best.className !== lastSent &&
        now - lastTime > 2000) {

        sendToAdafruit(best.className);

        lastSent = best.className;
        lastTime = now;
    }
}

function sendToAdafruit(value) {
    fetch(`https://io.adafruit.com/api/v2/${USERNAME}/feeds/${FEED}/data`, {
        method: "POST",
        headers: {
            "X-AIO-Key": AIO_KEY,
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ value: value })
    })
    .then(res => console.log("Sent:", value))
    .catch(err => console.error("Send error:", err));
}
</script>

</body>
</html>
